<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Perla's ESP Professional</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #1a1a1a 0%, #050505 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* حاوية النص الأساسية */
        .container {
            text-align: center;
            position: relative;
        }

        /* تأثير النص المتحرك الفخم */
        .logo-text {
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 10px;
            color: transparent;
            background: linear-gradient(45deg, #d4af37, #ffffff, #d4af37);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 3s linear infinite;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.3));
        }

        /* حركة الإضاءة على النص */
        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* الإطار المتحرك حول الاسم */
        .box {
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 40px 80px;
            position: relative;
            backdrop-filter: blur(10px);
            border-radius: 10px;
            animation: fadeIn 2s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* خط متحرك تحت الاسم */
        .line {
            width: 0%;
            height: 2px;
            background: #d4af37;
            margin: 10px auto;
            animation: expand 1.5s forwards 1s;
        }

        @keyframes expand {
            to { width: 100%; }
        }

        /* تأثير جزيئات في الخلفية */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box">
            <div class="logo-text">Perla's ESP</div>
            <div class="line"></div>
            <p style="color: #888; letter-spacing: 5px; font-size: 0.8rem;">ULTIMATE INTELLIGENCE</p>
        </div>
    </div>

</body>
</html>
