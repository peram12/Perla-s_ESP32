<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>ESP32 Dashboard</title>
    <style>
        :root {
            /* باليت الألوان الخاصة بكِ */
            --c1: #7AAACE; --c2: #9CD5FF; --c3: #355872;
            --c4: #F7F8F0; --c5: #FFF4EA; --c6: #0AC4E0;
            --c7: #088395; --c8: #EBF4F6; --c11: #B0FFFA; --c12: #00F7FF;
        }

        /* أنيميشن الخلفية (Aceternity Style) */
        body {
            margin: 0; padding: 0; min-height: 100vh;
            background: linear-gradient(-45deg, var(--c3), var(--c7), var(--c10, #296374), var(--c6));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Segoe UI', sans-serif;
            display: none; /* يظهر بعد الباسورد */
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* تأثير الزجاج للكروت */
        .glass {
            background: rgba(235, 244, 246, 0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
        }

        /* تأثير الـ Hover المتدرج (Serafim Style) */
        .msg-card {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            overflow: hidden;
        }

        .msg-card::before {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent, rgba(0, 247, 255, 0.3), transparent);
            transform: translateX(-100%); transition: 0.6s;
        }

        .msg-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--c12);
            box-shadow: 0 0 20px rgba(0, 247, 255, 0.4);
        }

        .msg-card:hover::before { transform: translateX(100%); }

        /* العنوان الاحترافي */
        .glow-text {
            color: white;
            text-shadow: 0 0 10px rgba(0, 247, 255, 0.5);
            font-weight: 900;
            letter-spacing: 2px;
        }
    </style>
</head>
<body class="p-4 md:p-10">

<div id="auth-overlay" class="fixed inset-0 z-[1000] flex items-center justify-center bg-[#0b111a]">
    <div class="text-center">
        <h1 class="text-4xl md:text-6xl font-black text-white mb-4 animate-pulse">Perla's ESP - 2026</h1>
        <div class="h-1 w-32 bg-cyan-400 mx-auto rounded-full shadow-[0_0_15px_#00F7FF]"></div>
    </div>
</div>

<div id="main-app" class="max-w-3xl mx-auto">
    <header class="glass p-8 mb-10 text-center">
        <h1 class="text-3xl md:text-5xl glow-text uppercase mb-2">ESP32 Dashboard</h1>
        <div id="status" class="text-cyan-200 text-xs font-mono tracking-widest opacity-70">SYSTEM SYNCHRONIZING...</div>
    </header>

    <div id="notifications-list" class="space-y-4">
        </div>
</div>

<div id="viewer" class="fixed inset-0 z-[500] hidden bg-black/90 backdrop-blur-2xl p-6 flex flex-col items-center justify-center">
    <button onclick="closeViewer()" class="absolute top-10 right-10 px-6 py-2 rounded-full bg-white/10 text-white border border-white/20 hover:bg-white/20 transition">
        CLOSE ×
    </button>
    <div id="viewer-body" class="w-full max-w-2xl flex items-center justify-center">
        </div>
</div>

<script>
    // الحماية
    setTimeout(() => {
        const pin = prompt("ACCESS CODE:");
        if (pin === "1712008") {
            document.getElementById('auth-overlay').classList.add('hidden');
            document.body.style.display = 'block';
        } else {
            window.location.reload();
        }
    }, 1200);

    const TOKEN = "8560208461:AAEC-4k06FP__JYXiiXPv-kDdyWRGNXNQhI";
    let lastId = 0;

    async function fetchFiles(fileId) {
        const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getFile?file_id=${fileId}`);
        const d = await r.json();
        return d.ok ? `https://api.telegram.org/file/bot${TOKEN}/${d.result.file_path}` : "";
    }

    function openViewer(html) {
        document.getElementById('viewer-body').innerHTML = html;
        document.getElementById('viewer').classList.remove('hidden');
    }

    function closeViewer() {
        document.getElementById('viewer').classList.add('hidden');
    }

    async function updateLoop() {
        try {
            const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=${lastId + 1}`);
            const data = await r.json();
            const list = document.getElementById('notifications-list');

            if (data.ok && data.result.length > 0) {
                for (const item of data.result) {
                    lastId = item.update_id;
                    const m = item.message;
                    if (!m) continue;

                    let icon = "⚡", title = "MESSAGE", content = "";
                    const time = new Date(m.date * 1000).toLocaleTimeString('en-GB', {hour: '2-digit', minute:'2-digit'});

                    if (m.text) {
                        const isLink = m.text.includes("http") || m.text.includes("www");
                        if (isLink) {
                            icon = "🔗"; title = "LINK RECEIVED";
                            let url = m.text.trim(); if(!url.startsWith('http')) url = 'https://'+url;
                            content = `<a href="${url}" target="_blank" class="glass p-10 text-2xl font-black text-cyan-400 border-2 border-dashed border-cyan-500 hover:bg-cyan-500/10 transition">LAUNCH URL 🚀</a>`;
                        } else {
                            content = `<div class="p-8 text-2xl text-white font-light text-center">${m.text}</div>`;
                        }
                    } else if (m.photo) {
                        icon = "📸"; title = "IMAGE FEED";
                        const url = await fetchFiles(m.photo[m.photo.length - 1].file_id);
                        content = `<img src="${url}" class="max-h-[70vh] rounded-3xl shadow-2xl border-4 border-white/10">`;
                    }

                    const div = document.createElement('div');
                    div.className = "msg-card glass p-6 flex justify-between items-center";
                    div.innerHTML = `
                        <div class="flex items-center gap-4 text-white">
                            <span class="text-2xl">${icon}</span>
                            <div>
                                <h3 class="font-bold tracking-tight">${title}</h3>
                                <p class="text-[10px] opacity-40 font-mono">${time}</p>
                            </div>
                        </div>
                        <div class="text-cyan-400 font-bold">VIEW →</div>
                    `;
                    div.onclick = () => openViewer(content);
                    list.prepend(div);
                }
            }
        } catch (e) {}
    }

    setInterval(updateLoop, 2000);
</script>
</body>
</html>
