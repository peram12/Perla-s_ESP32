<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>لوحة تحكم بيرلا التفاعلية</title>
    <style>
        :root {
            --bg-color: #f0f7ff;
            --container-bg: #ffffff;
            --primary-blue: #0077b6;
            --text-main: #023e8a;
            --border-color: #caf0f8;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; padding: 20px; 
            display: none; 
        }

        .container { max-width: 800px; margin: auto; }

        .header { 
            background: var(--container-bg); padding: 20px; 
            border-radius: 15px; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .entry { 
            background: var(--container-bg); padding: 15px; 
            border-radius: 12px; margin-bottom: 10px;
            border: 1px solid var(--border-color);
            cursor: pointer; transition: 0.3s;
            display: flex; justify-content: space-between; align-items: center;
        }

        .entry:hover { background: #e0f2fe; transform: scale(1.01); }

        .time { font-size: 0.8em; color: #888; }
        .message-preview { font-weight: bold; color: var(--text-main); }

        /* نافذة العرض المنبثقة */
        #viewer {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: white; 
            z-index: 1000; padding: 20px; box-sizing: border-box;
            overflow-y: auto; text-align: center;
        }

        .back-btn {
            background: var(--primary-blue); color: white; border: none;
            padding: 10px 20px; border-radius: 8px; cursor: pointer;
            margin-bottom: 20px; font-size: 1em;
        }

        #viewer-content img, #viewer-content video {
            max-width: 100%; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .link-style { color: #0077b6; text-decoration: underline; word-break: break-all; }
    </style>
</head>
<body>

<div id="main-page" class="container">
    <div class="header">
        <h1>إشعارات بيرلا الذكية 🛰️</h1>
        <p id="status">جاري الاتصال...</p>
    </div>
    <div id="data-log">
        </div>
</div>

<div id="viewer">
    <button class="back-btn" onclick="closeViewer()">⬅️ رجوع للقائمة</button>
    <hr>
    <div id="viewer-content"></div>
</div>

<script>
    // الحماية بكلمة المرور
    const pass = prompt("كلمة المرور:");
    if (pass === "1712008") {
        document.body.style.display = "block";
    } else {
        alert("خطأ!");
        window.location.href = "https://google.com";
    }

    const BOT_TOKEN = "8560208461:AAEC-4k06FP__JYXiiXPv-kDdyWRGNXNQhI";
    let lastUpdateId = 0;

    async function getFileUrl(fileId) {
        const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${fileId}`);
        const data = await res.json();
        return data.ok ? `https://api.telegram.org/file/bot${BOT_TOKEN}/${data.result.file_path}` : "";
    }

    function openViewer(htmlContent) {
        document.getElementById('viewer-content').innerHTML = htmlContent;
        document.getElementById('viewer').style.display = 'block';
        document.getElementById('main-page').style.display = 'none';
    }

    function closeViewer() {
        document.getElementById('viewer').style.display = 'none';
        document.getElementById('main-page').style.display = 'block';
    }

    async function checkUpdates() {
        try {
            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}`);
            const data = await res.json();

            if (data.ok && data.result.length > 0) {
                const log = document.getElementById('data-log');
                for (const update of data.result) {
                    lastUpdateId = update.update_id;
                    const msg = update.message;
                    if (!msg) continue;

                    const time = new Date(msg.date * 1000).toLocaleTimeString('ar-EG');
                    let previewText = "";
                    let fullContent = "";

                    if (msg.text) {
                        previewText = "💬 رسالة نصية";
                        // التحقق إذا كان النص رابطاً
                        if (msg.text.startsWith('http')) {
                            fullContent = `<h3>رابط مستلم:</h3><a href="${msg.text}" target="_blank" class="link-style">${msg.text}</a>`;
                        } else {
                            fullContent = `<h3>نص الرسالة:</h3><p>${msg.text}</p>`;
                        }
                    } 
                    else if (msg.photo) {
                        previewText = "📸 صورة جديدة";
                        const url = await getFileUrl(msg.photo[msg.photo.length - 1].file_id);
                        fullContent = `<h3>الصورة الملتقطة:</h3><img src="${url}" referrerpolicy="no-referrer">`;
                    }
                    else if (msg.video) {
                        previewText = "🎥 فيديو جديد";
                        const url = await getFileUrl(msg.video.file_id);
                        fullContent = `<h3>الفيديو:</h3><video controls src="${url}"></video>`;
                    }

                    const entry = document.createElement('div');
                    entry.className = 'entry';
                    entry.innerHTML = `<span class="message-preview">${previewText}</span><span class="time">${time}</span>`;
                    entry.onclick = () => openViewer(fullContent);
                    log.prepend(entry);
                }
                document.getElementById('status').innerText = "متصل - تحديث مباشر";
            }
        } catch (e) { console.log("Error"); }
    }

    setInterval(checkUpdates, 2000);
</script>

</body>
</html>
