<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>ESP32 Dashboard</title>
    <style>
        :root {
            --primary: #088395;
            --accent: #00F7FF;
            --bg: #F7F8F0;
            --card-bg: #EBF4F6;
            --dark-blue: #355872;
            --soft-blue: #9CD5FF;
            --text-color: #296374;
        }

        /* واجهة الدخول والخلفية المتحركة */
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(-45deg, #088395, #355872, #0AC4E0, #7AAACE);
            background-size: 400% 400%; animation: gradientBG 10s ease infinite;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; color: white; text-align: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* خلفية الـ Shader عند فراغ الرسائل */
        #empty-shader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #EBF4F6 0%, #7AAACE 100%);
            opacity: 0.3; z-index: -1; display: none;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: var(--bg); margin: 0; padding: 0; 
            color: var(--text-color); overflow-x: hidden;
        }

        .app-container { max-width: 600px; margin: auto; padding: 20px; position: relative; z-index: 10; }
        
        .header { 
            background: var(--card-bg); padding: 25px; border-radius: 24px;
            text-align: center; box-shadow: 0 10px 30px rgba(8, 131, 149, 0.1);
            margin-bottom: 30px; border: 1px solid var(--soft-blue);
        }

        /* تأثير الرسالة عند مرور الماوس (Gradient Border) */
        .notification-item { 
            background: var(--card-bg); padding: 18px; border-radius: 18px;
            margin-bottom: 15px; border: 2px solid transparent;
            cursor: pointer; transition: 0.3s;
            display: flex; justify-content: space-between; align-items: center;
            position: relative; overflow: hidden;
        }

        .notification-item:hover {
            border-image: linear-gradient(to right, #00F7FF, #088395) 1;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 247, 255, 0.2);
            background: #ffffff;
        }

        .type-icon { font-size: 1.3em; margin-left: 10px; }
        .time-label { font-size: 0.8em; color: var(--dark-blue); opacity: 0.7; }

        #content-viewer {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: var(--bg); 
            z-index: 9999; padding: 20px; box-sizing: border-box; overflow-y: auto;
        }

        .back-btn {
            background: var(--dark-blue); color: #B0FFFA; border: none;
            padding: 12px 30px; border-radius: 50px; cursor: pointer;
            font-weight: bold; transition: 0.3s;
        }

        .back-btn:hover { background: var(--primary); color: white; }

        .display-area { text-align: center; padding: 20px; animation: fadeIn 0.5s; }
        
        .display-area img {
            max-width: 100%; border-radius: 20px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.15); border: 5px solid white;
        }

        .link-card {
            background: var(--soft-blue); padding: 25px; border-radius: 20px;
            color: var(--dark-blue); text-decoration: none; display: block;
            word-break: break-all; font-weight: bold; border: 2px dashed var(--primary);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="auth-screen">
    <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Perla's ESP - 2026</h1>
    <p style="opacity: 0.8;">بانتظار التحقق من الهوية...</p>
</div>

<div id="empty-shader"></div>

<div id="main-screen" class="app-container" style="display:none;">
    <div class="header">
        <h1 style="margin:0; color:var(--primary); letter-spacing: 1px;">ESP32 Dashboard</h1>
        <small id="status-text" style="color:var(--dark-blue);">جاري المزامنة مع البوت...</small>
    </div>
    <div id="notifications-list"></div>
</div>

<div id="content-viewer">
    <div style="padding-bottom: 20px; border-bottom: 1px solid #ddd;">
        <button class="back-btn" onclick="goBack()">⬅️ عودة للرسائل</button>
    </div>
    <div id="viewer-body" class="display-area"></div>
</div>

<script>
    // نظام الدخول
    setTimeout(() => {
        const pin = prompt("أدخل رمز الدخول:");
        if (pin === "1712008") {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'block';
        } else {
            alert("خطأ!");
            window.location.reload();
        }
    }, 1000);

    const TOKEN = "8560208461:AAEC-4k06FP__JYXiiXPv-kDdyWRGNXNQhI";
    let lastId = 0;

    function showContent(html) {
        document.getElementById('viewer-body').innerHTML = html;
        document.getElementById('content-viewer').style.display = 'block';
        document.getElementById('main-screen').style.display = 'none';
    }

    function goBack() {
        document.getElementById('content-viewer').style.display = 'none';
        document.getElementById('main-screen').style.display = 'block';
    }

    async function fetchFiles(fileId) {
        const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getFile?file_id=${fileId}`);
        const d = await r.json();
        return d.ok ? `https://api.telegram.org/file/bot${TOKEN}/${d.result.file_path}` : "";
    }

    async function updateLoop() {
        try {
            const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=${lastId + 1}`);
            const data = await r.json();

            const shader = document.getElementById('empty-shader');
            const list = document.getElementById('notifications-list');

            if (data.ok && data.result.length > 0) {
                shader.style.display = 'none';
                for (const item of data.result) {
                    lastId = item.update_id;
                    const m = item.message;
                    if (!m) continue;

                    let title = "", icon = "", contentHtml = "";
                    const timeStr = new Date(m.date * 1000).toLocaleTimeString('ar-EG');

                    const isLink = m.text && (m.text.includes("http") || m.text.includes("www") || m.text.includes(".com"));

                    if (isLink) {
                        icon = "🔗"; title = "رابط مستلم";
                        let finalUrl = m.text.trim();
                        if (!finalUrl.startsWith('http')) finalUrl = 'https://' + finalUrl;
                        contentHtml = `<a href="${finalUrl}" target="_blank" class="link-card">فتح الرابط 🌐<br><br>${m.text}</a>`;
                    } else if (m.text) {
                        icon = "💬"; title = "رسالة نصية";
                        contentHtml = `<div class="link-card" style="background:#fff;">${m.text}</div>`;
                    } else if (m.photo) {
                        icon = "📸"; title = "صورة ملتقطة";
                        const url = await fetchFiles(m.photo[m.photo.length - 1].file_id);
                        contentHtml = `<img src="${url}">`;
                    }

                    const div = document.createElement('div');
                    div.className = 'notification-item';
                    div.innerHTML = `<div><span class="type-icon">${icon}</span> <b>${title}</b></div> <span class="time-label">${timeStr}</span>`;
                    div.onclick = () => showContent(contentHtml);
                    list.prepend(div);
                }
            } else if (list.children.length === 0) {
                shader.style.display = 'block';
            }
        } catch (e) { }
    }

    setInterval(updateLoop, 2000);
</script>
</body>
</html>
