<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perla's ESP | Professional Dashboard</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --dark-bg: #12141d; 
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(0, 210, 255, 0.2);
            --time-color: #00d2ff;
        }

        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle, #1a2238 0%, var(--dark-bg) 100%);
            color: white; font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden; height: 100vh;
        }

        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark-bg); display: flex;
            justify-content: center; align-items: center; z-index: 10000;
        }

        .login-box {
            background: var(--card-bg); padding: 40px; border-radius: 20px;
            border: 1px solid var(--border); text-align: center;
            backdrop-filter: blur(15px); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .login-box input {
            background: rgba(255,255,255,0.08); border: 1px solid var(--border);
            padding: 15px; color: white; text-align: center; font-size: 1.3rem;
            border-radius: 8px; outline: none; width: 100%; letter-spacing: 5px;
        }

        .login-box button {
            margin-top: 25px; background: var(--neon-blue); border: none;
            color: black; padding: 12px 40px; cursor: pointer;
            font-weight: 900; border-radius: 5px; text-transform: uppercase;
        }

        #main-content { display: none; height: 100vh; overflow-y: auto; }

        .header { text-align: center; padding: 30px 20px; }

        .logo-text {
            font-size: 2.2rem; font-weight: 900; letter-spacing: 5px;
            text-transform: uppercase; background: linear-gradient(45deg, var(--neon-blue), #ffffff, var(--neon-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 200% auto; animation: shine 3s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .app-container { max-width: 600px; margin: auto; padding: 20px; }

        .control-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding: 10px; border-radius: 10px; background: rgba(0, 210, 255, 0.1);
            border: 1px solid var(--border);
        }

        .status-bar { font-size: 0.7rem; color: var(--neon-blue); text-transform: uppercase; }

        .notification-item {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 15px; padding: 15px; margin-bottom: 15px;
            animation: fadeIn 0.5s ease;
        }

        .item-header { display: flex; justify-content: space-between; margin-bottom: 10px; }

        .time-label { color: var(--neon-blue); font-size: 0.8rem; font-weight: bold; }

        .photo-btn {
            background: var(--neon-blue); color: black; padding: 10px;
            text-align: center; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px;
        }

        #image-overlay {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); z-index: 10001; justify-content: center; align-items: center; flex-direction: column;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 class="logo-text" style="font-size: 1.2rem;">SYSTEM LOCKED</h2>
        <input type="password" id="pin-input" placeholder="••••••">
        <br>
        <button onclick="checkAccess()">UNLOCK</button>
    </div>
</div>

<div id="main-content">
    <div class="header">
        <h1 class="logo-text">Perla Dashboard</h1>
    </div>
    <div class="app-container">
        <div class="control-bar">
            <div class="status-bar" id="status-text">WAITING FOR DATA...</div>
            <div id="sync-icon" style="color: var(--neon-blue);">●</div>
        </div>
        <div id="notifications-list"></div>
    </div>
</div>

<div id="image-overlay" onclick="this.style.display='none'">
    <div id="img-container"></div>
    <p style="color: white; margin-top: 20px;">TAP ANYWHERE TO CLOSE</p>
</div>

<script>
    const PIN = "1712008";
    const TOKEN = "8560208461:AAEC-4k06FP__JYXiiXPv-kDdyWRGNXNQhI";
    let lastId = 0;

    function checkAccess() {
        if(document.getElementById('pin-input').value === PIN) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            startSync();
        } else { alert("WRONG PIN"); }
    }

    function startSync() {
        // تحديث فوري ثم كل 3 ثواني
        fetchUpdates();
        setInterval(fetchUpdates, 3000);
    }

    async function fetchUpdates() {
        const syncIcon = document.getElementById('sync-icon');
        syncIcon.style.opacity = '0.3';

        try {
            // استخدام تليجرام API مع تجنب الكاش (Cache) لضمان وصول الرسائل الجديدة
            const url = `https://api.telegram.org/bot${TOKEN}/getUpdates?offset=${lastId + 1}&limit=10&timeout=1`;
            const response = await fetch(url);
            const data = await response.json();

            if (data.ok && data.result.length > 0) {
                const list = document.getElementById('notifications-list');
                document.getElementById('status-text').innerText = "DATA RECEIVED";

                data.result.forEach(update => {
                    if (update.update_id > lastId) {
                        lastId = update.update_id;
                        renderMessage(update.message);
                    }
                });
            }
        } catch (error) {
            console.error("Sync Error:", error);
        } finally {
            syncIcon.style.opacity = '1';
        }
    }

    async function renderMessage(m) {
        if (!m) return;
        const list = document.getElementById('notifications-list');
        const time = new Date(m.date * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const div = document.createElement('div');
        div.className = 'notification-item';

        if (m.photo) {
            const fileId = m.photo[m.photo.length - 1].file_id;
            div.innerHTML = `
                <div class="item-header"><span>📸 NEW IMAGE</span><span class="time-label">${time}</span></div>
                <div class="photo-btn" onclick="showFullImage('${fileId}')">VIEW CAPTURE</div>
            `;
        } else if (m.text) {
            div.innerHTML = `
                <div class="item-header"><span>💬 MESSAGE</span><span class="time-label">${time}</span></div>
                <div style="color: #ccc;">${m.text}</div>
            `;
        }
        list.prepend(div);
    }

    async function showFullImage(fileId) {
        const overlay = document.getElementById('image-overlay');
        const container = document.getElementById('img-container');
        container.innerHTML = "<p style='color:white'>Loading...</p>";
        overlay.style.display = 'flex';

        try {
            const res = await fetch(`https://api.telegram.org/bot${TOKEN}/getFile?file_id=${fileId}`);
            const data = await res.json();
            const filePath = data.result.file_path;
            const finalUrl = `https://api.telegram.org/file/bot${TOKEN}/${filePath}`;
            container.innerHTML = `<img src="${finalUrl}" style="max-width: 90%; max-height: 80vh; border: 2px solid var(--neon-blue); border-radius: 10px;">`;
        } catch (e) {
            container.innerHTML = "<p style='color:red'>Error loading image</p>";
        }
    }
</script>
</body>
</html>
