<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perla's Elite Dashboard 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --bg-dark: #030712;
            --accent-cyan: #00F7FF;
            --accent-blue: #088395;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
            color: white;
            overflow-x: hidden;
            margin: 0;
        }

        /* خلفية Aceternity المتحركة */
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.4;
            background: 
                radial-gradient(at 0% 0%, rgba(0, 247, 255, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(53, 88, 114, 0.2) 0px, transparent 50%);
        }

        /* تأثير الزجاج المتطور */
        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .glass-panel:hover {
            border-color: rgba(0, 247, 255, 0.4);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 40px rgba(0, 247, 255, 0.1);
        }

        /* أنيميشن النص المضيء */
        .shimmer-text {
            background: linear-gradient(90deg, #fff 0%, #00F7FF 50%, #fff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .auth-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            text-align: center;
            letter-spacing: 0.5em;
            transition: 0.3s;
        }

        .auth-input:focus {
            border-color: var(--accent-cyan);
            outline: none;
            box-shadow: 0 0 20px rgba(0, 247, 255, 0.2);
        }
    </style>
</head>
<body>

<div class="mesh-bg"></div>

<div id="auth-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-[#030712]">
    <div class="text-center space-y-8 p-10 glass-panel max-w-sm w-full mx-4">
        <h2 class="text-3xl font-extrabold shimmer-text">PERLA SECURE</h2>
        <p class="text-gray-400 text-sm tracking-widest">ENTER ACCESS PROTOCOL</p>
        <input type="password" id="pin-input" class="auth-input w-full py-4 rounded-2xl text-xl" placeholder="••••">
        <button onclick="checkAuth()" class="w-full py-4 bg-cyan-500 text-black font-bold rounded-2xl hover:bg-cyan-400 transition-all shadow-[0_0_20px_rgba(0,247,255,0.4)]">
            AUTHORIZE
        </button>
    </div>
</div>

<main id="app" class="hidden min-h-screen p-6 md:p-12">
    <header class="max-w-4xl mx-auto flex justify-between items-center mb-16">
        <div>
            <h1 class="text-4xl font-black tracking-tighter shimmer-text uppercase">ESP32 Center</h1>
            <div class="flex items-center gap-2 mt-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span id="status-text" class="text-[10px] text-cyan-500/60 font-mono">ENCRYPTED CONNECTION ACTIVE</span>
            </div>
        </div>
        <div class="w-12 h-12 glass-panel flex items-center justify-center text-cyan-400">
            <i data-lucide="shield-check"></i>
        </div>
    </header>

    <div id="notifications-list" class="max-w-2xl mx-auto space-y-6">
        </div>
</main>

<div id="viewer" class="fixed inset-0 z-[200] hidden bg-black/90 backdrop-blur-3xl p-6 md:p-20">
    <div class="max-w-5xl mx-auto h-full flex flex-col">
        <button onclick="closeViewer()" class="self-start mb-8 px-8 py-3 glass-panel text-cyan-400 font-bold flex items-center gap-3 hover:scale-105">
            <i data-lucide="arrow-right"></i> عودة للوحة التحكم
        </button>
        <div id="viewer-content" class="flex-1 glass-panel overflow-hidden flex items-center justify-center relative p-4">
            </div>
    </div>
</div>

<script>
    lucide.createIcons();

    function checkAuth() {
        const pin = document.getElementById('pin-input').value;
        if (pin === "1712008") {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').classList.remove('hidden');
        } else {
            alert("ACCESS DENIED");
        }
    }

    const TOKEN = "8560208461:AAEC-4k06FP__JYXiiXPv-kDdyWRGNXNQhI";
    let lastId = 0;

    async function fetchFiles(fileId) {
        const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getFile?file_id=${fileId}`);
        const d = await r.json();
        return d.ok ? `https://api.telegram.org/file/bot${TOKEN}/${d.result.file_path}` : "";
    }

    function openViewer(html) {
        document.getElementById('viewer-content').innerHTML = html;
        document.getElementById('viewer').classList.remove('hidden');
    }

    function closeViewer() {
        document.getElementById('viewer').classList.add('hidden');
    }

    async function updateLoop() {
        try {
            const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=${lastId + 1}`);
            const data = await r.json();
            const list = document.getElementById('notifications-list');

            if (data.ok && data.result.length > 0) {
                for (const item of data.result) {
                    lastId = item.update_id;
                    const m = item.message;
                    if (!m) continue;

                    let icon = "cpu", title = "SYSTEM DATA", content = "";
                    const time = new Date(m.date * 1000).toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit'});

                    if (m.text) {
                        const isLink = m.text.includes("http") || m.text.includes("www");
                        if (isLink) {
                            icon = "external-link"; title = "NET PROTOCOL";
                            let url = m.text.trim(); if(!url.startsWith('http')) url = 'https://'+url;
                            content = `<div class="text-center space-y-8">
                                <div class="text-6xl text-cyan-400"><i data-lucide="globe" class="w-20 h-20 mx-auto"></i></div>
                                <a href="${url}" target="_blank" class="block px-12 py-6 bg-cyan-500 text-black text-2xl font-black rounded-3xl hover:shadow-[0_0_50px_rgba(0,247,255,0.5)] transition-all">LAUNCH SITE 🚀</a>
                                <p class="text-white/40 font-mono text-sm">${m.text}</p>
                            </div>`;
                        } else {
                            icon = "message-square"; title = "PLAINTEXT";
                            content = `<div class="p-12 text-3xl font-light leading-relaxed text-center tracking-wide">${m.text}</div>`;
                        }
                    } else if (m.photo) {
                        icon = "camera"; title = "OPTICAL FEED";
                        const url = await fetchFiles(m.photo[m.photo.length - 1].file_id);
                        content = `<img src="${url}" class="max-h-[75vh] rounded-3xl shadow-2xl border border-white/10">`;
                    }

                    const div = document.createElement('div');
                    div.className = "glass-panel p-6 flex justify-between items-center group cursor-pointer";
                    div.innerHTML = `
                        <div class="flex items-center gap-6">
                            <div class="w-14 h-14 rounded-2xl bg-cyan-500/10 flex items-center justify-center text-cyan-400 group-hover:bg-cyan-500 group-hover:text-black transition-all">
                                <i data-lucide="${icon}"></i>
                            </div>
                            <div>
                                <h3 class="font-bold text-lg group-hover:text-cyan-400 transition-colors uppercase tracking-tighter">${title}</h3>
                                <p class="text-[10px] text-white/30 font-mono mt-1 tracking-widest underline underline-offset-4">${time}</p>
                            </div>
                        </div>
                        <div class="text-cyan-500 opacity-0 group-hover:opacity-100 -translate-x-4 group-hover:translate-x-0 transition-all font-black italic">OPEN →</div>
                    `;
                    div.onclick = () => { openViewer(content); lucide.createIcons(); };
                    list.prepend(div);
                    lucide.createIcons();
                }
            }
        } catch (e) {}
    }

    setInterval(updateLoop, 2000);
</script>
</body>
</html>
