<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perla's ESP | Professional Interface</title>
    <style>
        /* الخلفية العامة فخمة وغامقة */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #1a1a1a 0%, #050505 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #e0e0e0;
        }

        /* الحاوية الرئيسية */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 350px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: slideUp 0.8s ease-out;
        }

        /* الاسم الجديد Perla's ESP بتأثير ذهبي */
        .brand-title {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #d4af37, #fdf5e6, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: goldShine 3s infinite linear;
            background-size: 200% auto;
        }

        /* قائمة الإشعارات (Message, Image, Link) */
        .status-list {
            list-style: none;
            padding: 0;
            margin: 20px 0;
            text-align: left;
        }

        .status-item {
            background: rgba(255, 255, 255, 0.05);
            margin: 10px 0;
            padding: 12px 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid #d4af37;
            transition: 0.3s;
        }

        .status-item:hover {
            background: rgba(212, 175, 55, 0.1);
            transform: translateX(5px);
        }

        /* زر الفحص الجديد: Check */
        .check-btn {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: transparent;
            border: 1px solid #d4af37;
            color: #d4af37;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.4s;
        }

        .check-btn:hover {
            background: #d4af37;
            color: #000;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        /* حركات الأنيميشن */
        @keyframes goldShine {
            to { background-position: 200% center; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <div class="brand-title">PERLA'S ESP</div>
        
        <div class="status-list">
            <div class="status-item">
                <span>Message</span>
                <small style="color: #666;">Received</small>
            </div>
            <div class="status-item">
                <span>Image</span>
                <small style="color: #666;">Ready</small>
            </div>
            <div class="status-item">
                <span>Link</span>
                <small style="color: #666;">Secure</small>
            </div>
        </div>

        <button class="check-btn">Check</button>
    </div>

</body>
</html>
