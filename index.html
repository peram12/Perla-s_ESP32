<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Perla's ESP Professional</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #1a1a1a 0%, #050505 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .logo-text {
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 10px;
            color: transparent;
            background: linear-gradient(45deg, #d4af37, #ffffff, #d4af37);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 3s linear infinite;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.3));
        }

        @keyframes shine { to { background-position: 200% center; } }

        .box {
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 40px 80px;
            backdrop-filter: blur(10px);
            border-radius: 10px;
            animation: fadeIn 2s ease-in-out;
            background: rgba(0, 0, 0, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .line {
            width: 0%;
            height: 2px;
            background: #d4af37;
            margin: 10px auto;
            animation: expand 1.5s forwards 1s;
        }

        @keyframes expand { to { width: 100%; } }

        /* الأقسام البرمجية المضافة ليعمل البوت */
        .bot-status {
            margin-top: 20px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            display: none; /* مخفي في البداية */
        }

        .status-item {
            margin: 10px 0;
            color: #d4af37;
            text-transform: uppercase;
        }

        /* زر التشغيل (Check) لربط البرنامج */
        .check-btn {
            background: transparent;
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 10px 30px;
            margin-top: 20px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 2px;
            transition: 0.3s;
            border-radius: 5px;
        }

        .check-btn:hover {
            background: #d4af37;
            color: black;
            box-shadow: 0 0 15px #d4af37;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box" id="mainBox">
            <div class="logo-text">Perla's ESP</div>
            <div class="line"></div>
            <p id="subText" style="color: #888; letter-spacing: 5px; font-size: 0.8rem;">ULTIMATE INTELLIGENCE</p>
            
            <button class="check-btn" onclick="activateBot()">CHECK</button>

            <div id="botDisplay" class="bot-status">
                <div class="status-item">Message: <span id="msgStat">Scanning...</span></div>
                <div class="status-item">Photo: <span id="photoStat">Ready</span></div>
                <div class="status-item">Link: <span id="linkStat">Secure</span></div>
            </div>
        </div>
    </div>

    <script>
        function activateBot() {
            // إخفاء النص الفرعي وإظهار حالة البوت
            document.getElementById('subText').style.display = 'none';
            document.getElementById('botDisplay').style.display = 'block';
            
            // محاكاة عمل البوت (يمكنك ربط الأوامر الحقيقية هنا)
            setTimeout(() => {
                document.getElementById('msgStat').innerText = 'Connected to Bot';
                console.log("Perla's ESP Bot Activated Successfully.");
            }, 1000);
        }
    </script>

</body>
</html>
