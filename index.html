<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perla's ESP | Professional Dashboard</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --dark-bg: #12141d; 
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(0, 210, 255, 0.2);
            --time-color: #00d2ff;
        }

        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle, #1a2238 0%, var(--dark-bg) 100%);
            color: white; font-family: 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden; height: 100vh;
        }

        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark-bg); display: flex;
            justify-content: center; align-items: center; z-index: 10000;
        }

        .login-box {
            background: var(--card-bg); padding: 40px; border-radius: 20px;
            border: 1px solid var(--border); text-align: center;
            backdrop-filter: blur(15px); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .login-box input {
            background: rgba(255,255,255,0.08); border: 1px solid var(--border);
            padding: 15px; color: white; text-align: center; font-size: 1.3rem;
            border-radius: 8px; outline: none; width: 100%; letter-spacing: 5px;
        }

        .login-box button {
            margin-top: 25px; background: var(--neon-blue); border: none;
            color: black; padding: 12px 40px; cursor: pointer;
            font-weight: 900; border-radius: 5px; text-transform: uppercase;
        }

        #main-content { display: none; }

        .header { text-align: center; padding: 40px 20px; }

        .logo-text {
            font-size: 2.5rem; font-weight: 900; letter-spacing: 5px;
            text-transform: uppercase; background: linear-gradient(45deg, var(--neon-blue), #ffffff, var(--neon-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 200% auto; animation: shine 3s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .app-container { max-width: 700px; margin: auto; padding: 20px; }

        .control-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding: 10px; border-radius: 10px; background: rgba(0, 210, 255, 0.05);
        }

        .status-bar { font-size: 0.8rem; color: var(--neon-blue); letter-spacing: 2px; }

        #clear-btn {
            display: none; background: rgba(255, 50, 50, 0.1);
            border: 1px solid #ff3232; color: #ff3232; padding: 5px 15px;
            border-radius: 5px; cursor: pointer; font-size: 0.7rem;
        }

        .notification-item {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 15px; padding: 20px; margin-bottom: 15px;
            animation: slideUp 0.4s ease-out;
        }

        .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }

        .time-label { color: var(--time-color); font-weight: bold; font-size: 0.8rem; }

        .photo-trigger {
            background: var(--neon-blue); color: black; padding: 10px;
            text-align: center; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px;
        }

        #content-viewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark-bg); z-index: 9999; padding: 20px; text-align: center; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 style="color: var(--neon-blue); margin-bottom: 20px;">ENCRYPTED ACCESS</h2>
        <input type="password" id="pin-input" placeholder="••••••">
        <br>
        <button onclick="checkAccess()">UNLOCK</button>
    </div>
</div>

<div id="main-content">
    <div class="header">
        <h1 class="logo-text">Perla's ESP32-CAM</h1>
    </div>
    <div class="app-container">
        <div class="control-bar">
            <div class="status-bar" id="status-text">SYSTEM STANDBY...</div>
            <button id="clear-btn" onclick="clearLogs()">CLEAR</button>
        </div>
        <div id="notifications-list"></div>
    </div>
</div>

<div id="content-viewer">
    <button onclick="goBack()" style="background: var(--neon-blue); border:none; padding:10px 20px; border-radius:5px; cursor:pointer; margin-bottom: 20px;">BACK</button>
    <div id="viewer-body"></div>
</div>

<script>
    const PIN = "1712008";
    const TOKEN = "8560208461:AAEC-4k06FP__JYXiiXPv-kDdyWRGNXNQhI";
    let lastUpdateId = 0;
    let seenMessages = new Set();

    function checkAccess() {
        if(document.getElementById('pin-input').value === PIN) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            setInterval(fetchUpdates, 2000);
        } else { alert("WRONG PIN"); }
    }

    async function fetchUpdates() {
        try {
            const response = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=10`);
            const data = await response.json();
            
            if(data.ok && data.result.length > 0) {
                const list = document.getElementById('notifications-list');
                document.getElementById('status-text').innerText = "MONITORING ACTIVE";

                data.result.forEach(async (update) => {
                    lastUpdateId = update.update_id;
                    const m = update.message;
                    if(!m || seenMessages.has(update.update_id)) return;
                    seenMessages.add(update.update_id);

                    const time = new Date(m.date * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    const div = document.createElement('div');
                    div.className = 'notification-item';

                    if(m.photo) {
                        const fileId = m.photo[m.photo.length - 1].file_id;
                        const fileResponse = await fetch(`https://api.telegram.org/bot${TOKEN}/getFile?file_id=${fileId}`);
                        const fileData = await fileResponse.json();
                        const imageUrl = `https://api.telegram.org/file/bot${TOKEN}/${fileData.result.file_path}`;
                        
                        div.innerHTML = `
                            <div class="item-header"><span style="color:var(--neon-blue)">📸 CAPTURE</span><span class="time-label">${time}</span></div>
                            <div class="photo-trigger" onclick="viewPhoto('${imageUrl}')">DECRYPT IMAGE</div>`;
                    } else if(m.text) {
                        div.innerHTML = `
                            <div class="item-header"><span style="color:var(--neon-blue)">💬 LOG</span><span class="time-label">${time}</span></div>
                            <div style="color:#ccc;">${m.text}</div>`;
                    }
                    list.prepend(div);
                });
                document.getElementById('clear-btn').style.display = 'block';
            }
        } catch (e) { console.error("Poll error", e); }
    }

    function viewPhoto(url) {
        document.getElementById('viewer-body').innerHTML = `<img src="${url}" style="max-width:100%; border-radius:10px; box-shadow:0 0 30px var(--neon-blue);">`;
        document.getElementById('content-viewer').style.display = 'block';
    }

    function goBack() { document.getElementById('content-viewer').style.display = 'none'; }
    function clearLogs() { document.getElementById('notifications-list').innerHTML = ""; document.getElementById('clear-btn').style.display = 'none'; }
</script>
</body>
</html>
