<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Perla's Secure Dashboard</title>
    <style>
        body { background: #0b0e14; color: #00d2ff; font-family: sans-serif; text-align: center; }
        .log-item { background: rgba(255,255,255,0.05); border: 1px solid #00d2ff; margin: 10px; padding: 15px; border-radius: 10px; }
        #login { position: fixed; inset: 0; background: #0b0e14; display: flex; justify-content: center; align-items: center; z-index: 99; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #00d2ff; background: transparent; color: white; }
    </style>
</head>
<body>

<div id="login">
    <div>
        <h2>ENTER ACCESS CODE</h2>
        <input type="password" id="pass" placeholder="••••••">
        <button onclick="access()" style="padding:10px 20px; cursor:pointer;">UNLOCK</button>
    </div>
</div>

<div id="app" style="display:none;">
    <h1 style="letter-spacing: 5px;">ESP32 MONITOR</h1>
    <div id="status">CONNECTING TO TELEGRAM...</div>
    <div id="logs"></div>
</div>

<script>
    const TOKEN = "8560208461:AAEC-4k06FP__JYXiiXPv-kDdyWRGNXNQhI";
    let lastId = -1;

    function access() {
        if(document.getElementById('pass').value === "1712008") {
            document.getElementById('login').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            startSync();
        } else { alert("WRONG!"); }
    }

    async function startSync() {
        while(true) {
            try {
                // نستخدم limit=100 عشان نجيب كل شيء مخزن
                const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=${lastId + 1}&limit=100`);
                const data = await r.json();
                if(data.ok && data.result.length > 0) {
                    data.result.forEach(update => {
                        if(update.update_id > lastId) {
                            lastId = update.update_id;
                            addLog(update.message);
                        }
                    });
                    document.getElementById('status').innerText = "SYSTEM ONLINE - DATA SYNCED";
                }
            } catch(e) {}
            await new Promise(b => setTimeout(b, 2000)); // انتظر ثانيتين
        }
    }

    function addLog(m) {
        if(!m) return;
        const logs = document.getElementById('logs');
        const div = document.createElement('div');
        div.className = 'log-item';
        const time = new Date(m.date * 1000).toLocaleTimeString();
        
        if(m.photo) {
            div.innerHTML = `<b>[${time}] 📸 IMAGE RECEIVED</b><br><button onclick="viewImg('${m.photo[m.photo.length-1].file_id}')">OPEN IMAGE</button>`;
        } else {
            div.innerHTML = `<b>[${time}] 💬 TEXT:</b> ${m.text || "New Data"}`;
        }
        logs.prepend(div);
    }

    async function viewImg(id) {
        const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getFile?file_id=${id}`);
        const d = await r.json();
        window.open(`https://api.telegram.org/file/bot${TOKEN}/${d.result.file_path}`, '_blank');
    }
</script>
</body>
</html>
