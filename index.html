<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Perla's ESP Professional</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #0a1128 0%, #050505 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
        }

        .container {
            text-align: center;
            position: relative;
        }

        /* تحويل اللون من ذهبي إلى أزرق احترافي */
        .logo-text {
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 10px;
            color: transparent;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5, #00d2ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 3s linear infinite;
            filter: drop-shadow(0 0 15px rgba(0, 210, 255, 0.5));
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .box {
            border: 1px solid rgba(0, 210, 255, 0.3);
            padding: 40px 60px;
            position: relative;
            backdrop-filter: blur(15px);
            border-radius: 15px;
            animation: fadeIn 2s ease-in-out;
            background: rgba(255, 255, 255, 0.02);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* العناصر المطلوبة: Message, Photo, Link */
        .status-info {
            margin-top: 20px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-align: left;
            display: inline-block;
        }

        .status-info div {
            margin: 10px 0;
            padding-left: 15px;
            border-left: 2px solid #00d2ff;
        }

        .line {
            width: 0%;
            height: 2px;
            background: #00d2ff;
            margin: 15px auto;
            animation: expand 1.5s forwards 1s;
        }

        @keyframes expand {
            to { width: 100%; }
        }

        /* زر الفحص المطلوب: Check */
        .check-btn {
            background: transparent;
            border: 1px solid #00d2ff;
            color: #00d2ff;
            padding: 10px 30px;
            margin-top: 25px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: 0.3s;
            border-radius: 5px;
            font-weight: bold;
        }

        .check-btn:hover {
            background: #00d2ff;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.6);
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="box">
            <div class="logo-text">Perla's ESP</div>
            <div class="line"></div>
            
            <div class="status-info">
                <div>MESSAGE</div>
                <div>PHOTO</div>
                <div>LINK</div>
            </div>

            <br>
            <button class="check-btn">CHECK</button>
            
            <p style="color: #444; letter-spacing: 5px; font-size: 0.7rem; margin-top: 20px;">ULTIMATE INTELLIGENCE</p>
        </div>
    </div>

</body>
</html>
