<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perla's ESP | Firebase Dashboard</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --dark-bg: #12141d;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(0, 210, 255, 0.2);
        }

        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle, #1a2238 0%, var(--dark-bg) 100%);
            color: white; font-family: 'Segoe UI', sans-serif;
            height: 100vh;
        }

        /* Login Screen */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark-bg); display: flex;
            justify-content: center; align-items: center; z-index: 10000;
        }

        .login-box {
            background: var(--card-bg); padding: 40px; border-radius: 20px;
            border: 1px solid var(--border); text-align: center; backdrop-filter: blur(15px);
        }

        .logo-text {
            font-size: 2.5rem; font-weight: 900; letter-spacing: 5px;
            background: linear-gradient(45deg, var(--neon-blue), #ffffff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        input {
            background: rgba(255,255,255,0.08); border: 1px solid var(--border);
            padding: 15px; color: white; border-radius: 8px; width: 100%; margin-top: 20px;
        }

        button {
            margin-top: 25px; background: var(--neon-blue); border: none;
            padding: 12px 40px; cursor: pointer; font-weight: bold; border-radius: 5px;
        }

        /* Main Content */
        #main-content { display: none; padding: 20px; }
        .app-container { max-width: 700px; margin: auto; }
        
        .notification-item {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 15px; padding: 20px; margin-bottom: 20px;
            animation: slideUp 0.5s ease-out;
        }

        .time-label { color: var(--neon-blue); font-size: 0.8rem; background: rgba(0,210,255,0.1); padding: 4px 8px; border-radius: 5px; }

        .photo-trigger {
            background: rgba(255,255,255,0.05); padding: 15px; text-align: center;
            cursor: pointer; border-radius: 8px; margin-top: 10px; color: var(--neon-blue);
            border: 1px solid var(--border); font-weight: bold;
        }

        #viewer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark-bg); z-index: 9999; padding: 20px; text-align: center;
        }

        #viewer img { max-width: 90%; border-radius: 15px; margin-top: 20px; box-shadow: 0 0 30px var(--neon-blue); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 class="logo-text">SECURE ACCESS</h2>
        <input type="password" id="pin-input" placeholder="••••••">
        <button onclick="checkAccess()">UNLOCK</button>
    </div>
</div>

<div id="main-content">
    <div style="text-align:center; padding: 20px;">
        <h1 class="logo-text">Perla's ESP</h1>
        <p id="status" style="color:var(--neon-blue)">WAITING FOR DATA...</p>
    </div>
    <div class="app-container" id="list"></div>
</div>

<div id="viewer">
    <button onclick="closeViewer()" style="float:left">← BACK</button>
    <div id="viewer-content"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

    // --- حطي معلوماتك هون ---
    const firebaseConfig = {
        apiKey: "AIzaSy...",
        databaseURL: "your-project-default-rtdb.firebaseio.com",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // التحقق من الرقم السري
    window.checkAccess = () => {
        if(document.getElementById('pin-input').value === "1712008") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            startListening();
        } else { alert("WRONG PIN"); }
    };

    function startListening() {
        const photoRef = ref(db, 'last_photo');
        onValue(photoRef, (snapshot) => {
            const url = snapshot.val();
            if(url) {
                const time = new Date().toLocaleTimeString();
                const div = document.createElement('div');
                div.className = 'notification-item';
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between">
                        <span style="color:var(--neon-blue)">📸 FIREBASE CAPTURE</span>
                        <span class="time-label">${time}</span>
                    </div>
                    <div class="photo-trigger" onclick="openPhoto('${url}')">DECRYPT IMAGE</div>
                `;
                document.getElementById('list').prepend(div);
                document.getElementById('status').innerText = "SYSTEM LIVE - IMAGE RECEIVED";
            }
        });
    }

    window.openPhoto = (url) => {
        document.getElementById('viewer-content').innerHTML = `<img src="${url}">`;
        document.getElementById('viewer').style.display = 'block';
    };

    window.closeViewer = () => { document.getElementById('viewer').style.display = 'none'; };
</script>

</body>
</html>
