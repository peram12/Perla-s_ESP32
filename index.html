<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <title>ESP32 Dashboard</title>
    <style>
        :root {
            --c1: #088395; --c2: #00F7FF; --c3: #355872; --c4: #F7F8F0;
            --c5: #B0FFFA; --c6: #7AAACE;
        }

        /* تأثير الخلفية المتحركة (Aceternity Style) */
        .gradient-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(125deg, #355872, #088395, #00F7FF, #296374);
            background-size: 400% 400%; z-index: -1; animation: moveGradient 15s infinite alternate;
        }
        @keyframes moveGradient { 0% {background-position: 0% 50%} 100% {background-position: 100% 50%} }

        /* الزر المتدرج الاحترافي (Serafim Style) */
        .modern-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative; overflow: hidden;
        }
        .modern-card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 247, 255, 0.2), transparent);
            transition: 0.5s;
        }
        .modern-card:hover::before { left: 100%; }
        .modern-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--c2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        /* إخفاء السكرول بار */
        ::-webkit-scrollbar { width: 0px; }
        body { color: white; background: #0b111a; display: none; }
        
        .title-glitch {
            font-weight: 900; text-transform: uppercase; letter-spacing: 4px;
            background: linear-gradient(to right, #B0FFFA, #00F7FF);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="antialiased">

<div id="auth-screen" class="fixed inset-0 z-[200] flex items-center justify-center bg-[#0b111a]">
    <div class="gradient-bg opacity-40"></div>
    <div class="text-center z-10 p-10">
        <h1 class="text-6xl font-black mb-6 title-glitch animate-pulse">Perla's ESP - 2026</h1>
        <div class="h-[2px] w-48 bg-cyan-400 mx-auto mb-8 shadow-[0_0_15px_#00F7FF]"></div>
        <p class="text-cyan-200 tracking-[0.3em] text-sm uppercase">Secure Access Required</p>
    </div>
</div>

<div id="main-content" class="relative min-h-screen p-8">
    <div class="gradient-bg opacity-20"></div>
    
    <header class="max-w-4xl mx-auto mb-16 text-center pt-10">
        <h1 class="text-5xl font-black mb-4 title-glitch">ESP32 Dashboard</h1>
        <div class="inline-block px-4 py-1 rounded-full bg-cyan-950 border border-cyan-800 text-cyan-400 text-xs font-mono">
            SYSTEM ONLINE: 100% SECURE
        </div>
    </header>

    <div id="notifications-list" class="max-w-2xl mx-auto space-y-6">
        </div>
</div>

<div id="viewer" class="fixed inset-0 z-[300] hidden bg-black/90 backdrop-blur-3xl p-10">
    <div class="max-w-3xl mx-auto h-full flex flex-col">
        <button onclick="closeViewer()" class="self-start mb-8 px-8 py-3 rounded-xl bg-white/10 border border-white/20 hover:bg-white/20 transition-all font-bold">
            ⬅ BACK TO HUB
        </button>
        <div id="viewer-content" class="flex-1 flex items-center justify-center rounded-3xl overflow-hidden border border-white/10 bg-white/5 shadow-2xl">
            </div>
    </div>
</div>
