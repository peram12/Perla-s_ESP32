<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Perla's Secure Dashboard</title>
    <style>
        :root { --neon: #00d2ff; --bg: #0b0e14; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        #login { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .box { background: rgba(255,255,255,0.05); padding: 30px; border: 1px solid var(--neon); border-radius: 15px; box-shadow: 0 0 20px rgba(0,210,255,0.2); }
        input { background: transparent; border: 1px solid var(--neon); color: white; padding: 10px; text-align: center; border-radius: 5px; outline: none; }
        #app { display: none; padding: 20px; }
        .log { background: rgba(255,255,255,0.03); border-left: 4px solid var(--neon); margin: 10px auto; padding: 15px; max-width: 500px; text-align: left; animation: slide 0.3s ease; }
        @keyframes slide { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .time { color: var(--neon); font-size: 0.8rem; float: right; }
        button { background: var(--neon); color: black; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div id="login">
    <div class="box">
        <h2 style="color: var(--neon); letter-spacing: 3px;">SYSTEM ACCESS</h2>
        <input type="password" id="pin" placeholder="ENTER PIN">
        <br><br>
        <button onclick="unlock()">ACCESS</button>
    </div>
</div>

<div id="app">
    <h1 style="letter-spacing: 5px; text-transform: uppercase;">Perla Monitoring</h1>
    <div id="status" style="font-size: 0.7rem; color: #555;">SCANNING ALL TRAFFIC...</div>
    <div id="display"></div>
</div>

<script>
    const TOKEN = "8560208461:AAEC-4k06FP__JYXiiXPv-kDdyWRGNXNQhI";
    let lastUpdateId = 0;

    function unlock() {
        if(document.getElementById('pin').value === "1712008") {
            document.getElementById('login').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            fetchData();
            setInterval(fetchData, 2000); 
        } else { alert("ACCESS DENIED"); }
    }

    async function fetchData() {
        try {
            // التعديل هنا: نراقب الـ Updates ونطلب من تليجرام عرض أي حركة في الشات
            const response = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=${lastUpdateId + 1}&limit=100`);
            const data = await response.json();

            if(data.ok && data.result.length > 0) {
                const display = document.getElementById('display');
                
                data.result.forEach(update => {
                    lastUpdateId = update.update_id;
                    
                    // السر هنا: بنفحص ملقات مختلفة (رسائل عادية، رسائل قنوات، أو حتى تعديلات)
                    const msg = update.message || update.channel_post || update.edited_message;
                    if(!msg) return;

                    processMessage(msg);
                });
            }
        } catch (e) { console.error("Sync error"); }
    }

    function processMessage(msg) {
        const display = document.getElementById('display');
        const time = new Date(msg.date * 1000).toLocaleTimeString();
        const div = document.createElement('div');
        div.className = 'log';

        // فحص إذا كانت الرسالة تحتوي على صورة (حتى لو البوت اللي بعتها لقناة)
        if(msg.photo) {
            const fileId = msg.photo[msg.photo.length - 1].file_id;
            div.innerHTML = `<span class="time">${time}</span><strong>📸 SYSTEM CAPTURE</strong><br><button onclick="getImg('${fileId}')">OPEN PHOTO</button>`;
        } 
        // فحص إذا كانت رسالة نصية
        else if(msg.text) {
            div.innerHTML = `<span class="time">${time}</span><strong>💬 SIGNAL:</strong> ${msg.text}`;
        } else {
            return; // تجاهل الرسائل الفارغة
        }

        display.prepend(div);
        document.getElementById('status').innerText = "LAST DATA: " + time;
    }

    async function getImg(id) {
        const res = await fetch(`https://api.telegram.org/bot${TOKEN}/getFile?file_id=${id}`);
        const data = await res.json();
        const url = `https://api.telegram.org/file/bot${TOKEN}/${data.result.file_path}`;
        window.open(url, '_blank');
    }
</script>
</body>
</html>
