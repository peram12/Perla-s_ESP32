<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>لوحة تحكم بيرلا الاحترافية</title>
    <style>
        :root {
            --primary: #0077b6;
            --bg: #f8faff;
            --card: #ffffff;
            --text: #023e8a;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: var(--bg); 
            margin: 0; padding: 0; 
            display: none; /* حماية بكلمة السر */
        }

        /* تنسيق القائمة الرئيسية */
        .app-container { max-width: 600px; margin: auto; padding: 20px; }
        
        .header { 
            background: var(--card); padding: 20px; border-radius: 20px;
            text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px; border-bottom: 4px solid var(--primary);
        }

        .notification-item { 
            background: var(--card); padding: 15px; border-radius: 15px;
            margin-bottom: 12px; border: 1px solid #eef2f6;
            cursor: pointer; transition: 0.2s;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .notification-item:hover { transform: translateY(-2px); background: #f0f7ff; }

        .type-icon { font-size: 1.2em; margin-left: 10px; }
        .time-label { font-size: 0.75em; color: #a0aec0; }

        /* نافذة عرض المحتوى (التي تفتح عند الضغط) */
        #content-viewer {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: #ffffff; 
            z-index: 9999; padding: 20px; box-sizing: border-box;
            overflow-y: auto;
        }

        .back-bar {
            display: flex; align-items: center; padding-bottom: 20px;
            border-bottom: 1px solid #eee; margin-bottom: 20px;
        }

        .back-btn {
            background: var(--primary); color: white; border: none;
            padding: 10px 25px; border-radius: 50px; cursor: pointer;
            font-weight: bold; font-size: 1rem;
        }

        .display-area { text-align: center; padding: 20px; }
        
        .display-area img, .display-area video {
            max-width: 100%; border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .link-card {
            background: #f0f7ff; padding: 20px; border-radius: 15px;
            color: var(--primary); text-decoration: none; display: block;
            word-break: break-all; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="main-screen" class="app-container">
    <div class="header">
        <h1 style="margin:0; color:var(--primary);">بريد بيرلا الذكي 🛰️</h1>
        <small id="status-text" style="color:#48cae4;">جاري المزامنة...</small>
    </div>
    <div id="notifications-list">
        </div>
</div>

<div id="content-viewer">
    <div class="back-bar">
        <button class="back-btn" onclick="goBack()">⬅️ عودة للرسائل</button>
    </div>
    <div id="viewer-body" class="display-area">
        </div>
</div>

<script>
    // 1. نظام الحماية
    const pin = prompt("أدخل رمز الدخول الخاص بكِ:");
    if (pin === "1712008") {
        document.body.style.display = "block";
    } else {
        alert("الرمز غير صحيح!");
        window.location.href = "https://www.google.com";
    }

    const TOKEN = "8560208461:AAEC-4k06FP__JYXiiXPv-kDdyWRGNXNQhI";
    let lastId = 0;

    // 2. وظائف الانتقال والرجوع
    function showContent(html) {
        document.getElementById('viewer-body').innerHTML = html;
        document.getElementById('content-viewer').style.display = 'block';
        document.getElementById('main-screen').style.display = 'none';
    }

    function goBack() {
        document.getElementById('content-viewer').style.display = 'none';
        document.getElementById('main-screen').style.display = 'block';
    }

    async function fetchFiles(fileId) {
        const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getFile?file_id=${fileId}`);
        const d = await r.json();
        return d.ok ? `https://api.telegram.org/file/bot${TOKEN}/${d.result.file_path}` : "";
    }

    // 3. جلب التحديثات
    async function updateLoop() {
        try {
            const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=${lastId + 1}`);
            const data = await r.json();

            if (data.ok && data.result.length > 0) {
                const list = document.getElementById('notifications-list');
                for (const item of data.result) {
                    lastId = item.update_id;
                    const m = item.message;
                    if (!m) continue;

                    let title = "", icon = "", contentHtml = "";
                    const timeStr = new Date(m.date * 1000).toLocaleTimeString('ar-EG');

                    if (m.text) {
                        icon = "💬"; title = "رسالة نصية";
                        if (m.text.includes("http")) {
                            icon = "🔗"; title = "رابط مستلم";
                            contentHtml = `<h3>الرابط:</h3><a href="${m.text}" target="_blank" class="link-card">${m.text}</a><p>اضغطي على الرابط لفتحه</p>`;
                        } else {
                            contentHtml = `<h3>نص الرسالة:</h3><div class="link-card" style="color:#333;">${m.text}</div>`;
                        }
                    } else if (m.photo) {
                        icon = "📸"; title = "صورة ملتقطة";
                        const url = await fetchFiles(m.photo[m.photo.length - 1].file_id);
                        contentHtml = `<h3>المعاينة:</h3><img src="${url}">`;
                    }

                    const div = document.createElement('div');
                    div.className = 'notification-item';
                    div.innerHTML = `<div><span class="type-icon">${icon}</span> <b>${title}</b></div> <span class="time-label">${timeStr}</span>`;
                    div.onclick = () => showContent(contentHtml);
                    list.prepend(div);
                }
                document.getElementById('status-text').innerText = "متصل - تم التحديث";
            }
        } catch (e) { }
    }

    setInterval(updateLoop, 2000);
</script>

</body>
</html>
