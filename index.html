<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Perla's Secure Dashboard</title>
    <style>
        :root { --neon: #00d2ff; --bg: #0b0e14; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        #login { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .box { background: rgba(255,255,255,0.05); padding: 30px; border: 1px solid var(--neon); border-radius: 15px; }
        input { background: transparent; border: 1px solid var(--neon); color: white; padding: 10px; text-align: center; border-radius: 5px; outline: none; }
        #app { display: none; padding: 20px; }
        .log { background: rgba(255,255,255,0.03); border-left: 4px solid var(--neon); margin: 10px auto; padding: 15px; max-width: 500px; text-align: left; }
        .time { color: var(--neon); font-size: 0.8rem; float: right; }
        button { background: var(--neon); color: black; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div id="login">
    <div class="box">
        <h2 style="color: var(--neon);">SYSTEM ACCESS</h2>
        <input type="password" id="pin" placeholder="ENTER PIN">
        <br><br>
        <button onclick="unlock()">ACCESS</button>
    </div>
</div>

<div id="app">
    <h1 style="letter-spacing: 5px;">Perla Monitoring</h1>
    <div id="status" style="font-size: 0.7rem; color: #555;">SCANNING...</div>
    <div id="display"></div>
</div>

<script>
    const TOKEN = "8560208461:AAEC-4k06FP__JYXiiXPv-kDdyWRGNXNQhI";
    let lastId = 0;

    function unlock() {
        if(document.getElementById('pin').value === "1712008") {
            document.getElementById('login').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            setInterval(fetchData, 2000); 
        } else { alert("WRONG!"); }
    }

    async function fetchData() {
        try {
            const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=${lastId + 1}`);
            const data = await r.json();

            if(data.ok && data.result.length > 0) {
                data.result.forEach(u => {
                    lastId = u.update_id;
                    const m = u.message;
                    if(!m) return;

                    const time = new Date(m.date * 1000).toLocaleTimeString();
                    const div = document.createElement('div');
                    div.className = 'log';

                    // لو الرسالة جاية منكِ (نص)
                    if(m.text && m.text !== "SYSTEM_CAPTURE_EVENT") {
                        div.innerHTML = `<span class="time">${time}</span><strong>💬 USER:</strong> ${m.text}`;
                        document.getElementById('display').prepend(div);
                    } 
                    // لو "الإشارة" وصلت من الـ ESP32
                    else if(m.text === "SYSTEM_CAPTURE_EVENT") {
                        div.innerHTML = `<span class="time">${time}</span><strong>📸 ESP32 CAPTURE</strong><br><button onclick="findImage()">VIEW LAST PHOTO</button>`;
                        document.getElementById('display').prepend(div);
                    }
                });
            }
        } catch (e) {}
    }

    async function findImage() {
        // وظيفة تبحث عن آخر صورة ببعتها البوت
        alert("Fetching image from secure servers...");
        // سيقوم بفتح تليجرام مباشرة لرؤية الصورة
        window.open(`https://t.me/c/${TOKEN.split(':')[0]}`, '_blank');
    }
</script>
</body>
</html>
