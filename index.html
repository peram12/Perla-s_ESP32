<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>ESP32 Dashboard</title>
    <style>
        /* تعريف الألوان التي أرسلتِها */
        :root {
            --c1: #7AAACE; --c2: #9CD5FF; --c3: #355872;
            --c4: #F7F8F0; --c5: #FFF4EA; --c6: #0AC4E0;
            --c7: #088395; --c8: #EBF4F6; --c9: #629FAD;
            --c10: #296374; --c11: #B0FFFA; --c12: #00F7FF;
        }

        /* أنيميشن الخلفية المتحركة لصفحة الدخول */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .auth-bg {
            background: linear-gradient(-45deg, var(--c3), var(--c7), var(--c10), var(--c6));
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
        }

        /* تأثير الـ Hover المتدرج على الرسائل */
        .notification-card {
            background: var(--c8);
            border: 2px solid transparent;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            z-index: 1;
        }

        .notification-card:hover {
            transform: translateY(-5px) scale(1.02);
            background: white;
            border-color: var(--c12);
            box-shadow: 0 0 20px rgba(0, 247, 255, 0.4);
        }

        /* خلفية الـ Shader عند الفراغ */
        .shader-canvas {
            background: radial-gradient(circle at center, var(--c11) 0%, var(--c1) 100%);
            filter: blur(80px);
            opacity: 0.4;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        }

        body { background-color: var(--c4); color: var(--c10); margin: 0; display: none; }
        
        .glass {
            background: rgba(255, 254, 234, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="min-h-screen">

<div id="auth-screen" class="fixed inset-0 z-[100] auth-bg flex flex-col items-center justify-center text-white p-6">
    <div class="glass p-12 rounded-[40px] shadow-2xl text-center">
        <h1 class="text-4xl font-black mb-4 tracking-tighter" style="color: var(--c3)">Perla's ESP - 2026</h1>
        <div class="w-16 h-1 bg-cyan-400 mx-auto rounded-full animate-pulse"></div>
        <p class="mt-4 opacity-80" style="color: var(--c10)">بانتظار التحقق الآمن...</p>
    </div>
</div>

<div id="empty-shader" class="shader-canvas"></div>

<div id="main-content" class="max-w-2xl mx-auto p-6 relative z-10">
    <header class="glass rounded-[30px] p-8 mb-8 text-center shadow-lg border-b-4" style="border-color: var(--c7)">
        <h1 class="text-3xl font-bold uppercase tracking-widest" style="color: var(--c7)">ESP32 Dashboard</h1>
        <p id="status" class="text-sm mt-2 font-medium" style="color: var(--c9)">جاري جلب البيانات من السيرفر...</p>
    </header>

    <div id="notifications-list" class="space-y-4">
        </div>
</div>

<div id="viewer" class="fixed inset-0 z-[150] bg-white hidden overflow-y-auto p-6">
    <div class="max-w-2xl mx-auto">
        <button onclick="closeViewer()" class="mb-8 flex items-center gap-2 font-bold px-6 py-3 rounded-full text-white shadow-lg transition hover:scale-105" style="background: var(--c3)">
            <span>⬅️</span> عودة للقائمة
        </button>
        <div id="viewer-content" class="rounded-3xl overflow-hidden shadow-2xl bg-gray-50 p-4 min-h-[300px] flex items-center justify-center">
            </div>
    </div>
</div>

<script>
    // نظام الحماية
    setTimeout(() => {
        const pin = prompt("أدخل الرمز السري:");
        if (pin === "1712008") {
            document.getElementById('auth-screen').style.fadeOut = "slow";
            document.getElementById('auth-screen').classList.add('hidden');
            document.body.style.display = "block";
        } else {
            alert("الرمز خاطئ!");
            window.location.reload();
        }
    }, 1500);

    const TOKEN = "8560208461:AAEC-4k06FP__JYXiiXPv-kDdyWRGNXNQhI";
    let lastId = 0;

    async function fetchFiles(fileId) {
        const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getFile?file_id=${fileId}`);
        const d = await r.json();
        return d.ok ? `https://api.telegram.org/file/bot${TOKEN}/${d.result.file_path}` : "";
    }

    function openViewer(html) {
        document.getElementById('viewer-content').innerHTML = html;
        document.getElementById('viewer').classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    }

    function closeViewer() {
        document.getElementById('viewer').classList.add('hidden');
        document.body.style.overflow = 'auto';
    }

    async function updateLoop() {
        try {
            const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=${lastId + 1}`);
            const data = await r.json();
            const list = document.getElementById('notifications-list');
            const shader = document.getElementById('empty-shader');

            if (data.ok && data.result.length > 0) {
                shader.classList.add('hidden');
                for (const item of data.result) {
                    lastId = item.update_id;
                    const m = item.message;
                    if (!m) continue;

                    let icon = "💬", title = "رسالة", content = "";
                    const time = new Date(m.date * 1000).toLocaleTimeString('ar-EG');

                    if (m.text) {
                        const isLink = m.text.includes("http") || m.text.includes("www");
                        if (isLink) {
                            icon = "🔗"; title = "رابط مستلم";
                            let url = m.text.trim(); if(!url.startsWith('http')) url = 'https://'+url;
                            content = `<div class="p-8 text-center"><a href="${url}" target="_blank" class="block p-6 rounded-2xl border-4 border-dashed font-bold text-xl transition hover:bg-cyan-50" style="color:var(--c7); border-color:var(--c6)">اضغطي لفتح الرابط 🌐<br><br><span class="text-sm opacity-60">${m.text}</span></a></div>`;
                        } else {
                            content = `<div class="p-8 text-2xl font-medium leading-relaxed" style="color:var(--c3)">${m.text}</div>`;
                        }
                    } else if (m.photo) {
                        icon = "📸"; title = "صورة ملتقطة";
                        const url = await fetchFiles(m.photo[m.photo.length - 1].file_id);
                        content = `<img src="${url}" class="max-w-full rounded-xl shadow-lg">`;
                    }

                    const div = document.createElement('div');
                    div.className = "notification-card p-5 rounded-2xl flex justify-between items-center cursor-pointer";
                    div.innerHTML = `<div class="flex items-center gap-4"><span class="text-2xl">${icon}</span><span class="font-bold" style="color:var(--c10)">${title}</span></div><span class="text-xs opacity-50">${time}</span>`;
                    div.onclick = () => openViewer(content);
                    list.prepend(div);
                }
                document.getElementById('status').innerText = "الموقع متصل بالبوت الآن ✅";
            }
        } catch (e) {}
    }

    setInterval(updateLoop, 2000);
</script>
</body>
</html>
