<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Perla's ESP Professional</title>
    <style>
        :root {
            --primary: #00d2ff; /* اللون الأزرق النيون */
            --bg: #050505;      /* الخلفية السوداء */
            --card: rgba(255, 255, 255, 0.03); /* التصميم الزجاجي */
            --text: #ffffff;
            --border: rgba(0, 210, 255, 0.2);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: radial-gradient(circle at center, #0a1128 0%, var(--bg) 100%);
            color: var(--text);
            margin: 0;
            padding: 0; 
            display: none; /* يظهر بعد الرمز */
            overflow-x: hidden;
        }

        .app-container { max-width: 600px; margin: auto; padding: 20px; }
        
        /* الهيدر المطور */
        .header { 
            background: var(--card);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 25px;
            border: 1px solid var(--border);
        }

        .logo-text {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            background: linear-gradient(45deg, var(--primary), #ffffff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 3s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        /* العناصر المستلمة */
        .notification-item { 
            background: var(--card);
            padding: 18px;
            border-radius: 15px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .notification-item:hover { 
            transform: scale(1.02);
            background: rgba(0, 210, 255, 0.1);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }

        .type-icon { font-size: 1.2em; margin-right: 10px; }
        .time-label { font-size: 0.75em; color: #555; }

        /* عارض المحتوى الكامل */
        #content-viewer {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); 
            z-index: 9999;
            padding: 25px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .back-bar {
            display: flex;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .back-btn {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .back-btn:hover { background: var(--primary); color: #000; }

        .display-area { text-align: center; padding: 20px; }
        
        .display-area img {
            max-width: 100%;
            border-radius: 15px; 
            box-shadow: 0 10px 40px rgba(0,210,255,0.3);
            border: 1px solid var(--border);
        }

        .link-card {
            background: rgba(0, 210, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            color: var(--primary);
            text-decoration: none;
            display: block;
            word-break: break-all;
            font-weight: bold;
            border: 2px dashed var(--primary);
            transition: 0.3s;
        }

        .link-card:hover { background: rgba(0, 210, 255, 0.15); box-shadow: 0 0 20px var(--primary); }

        .status-active { color: var(--primary); font-size: 0.7rem; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="main-screen" class="app-container">
    <div class="header">
        <div class="logo-text">Perla's ESP</div>
        <small id="status-text" class="status-active">SYSTEM SCANNING...</small>
    </div>
    <div id="notifications-list"></div>
</div>

<div id="content-viewer">
    <div class="back-bar">
        <button class="back-btn" onclick="goBack()">← BACK TO SYSTEM</button>
    </div>
    <div id="viewer-body" class="display-area"></div>
</div>

<script>
    // الحماية بالرمز
    const pin = prompt("PERLA'S ESP | ENTER ACCESS KEY:");
    if (pin === "1712008") {
        document.body.style.display = "block";
    } else {
        alert("ACCESS DENIED!");
        window.location.href = "https://www.google.com";
    }

    const TOKEN = "8560208461:AAEC-4k06FP__JYXiiXPv-kDdyWRGNXNQhI";
    let lastId = 0;

    function showContent(html) {
        document.getElementById('viewer-body').innerHTML = html;
        document.getElementById('content-viewer').style.display = 'block';
        document.getElementById('main-screen').style.display = 'none';
    }

    function goBack() {
        document.getElementById('content-viewer').style.display = 'none';
        document.getElementById('main-screen').style.display = 'block';
    }

    async function fetchFiles(fileId) {
        const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getFile?file_id=${fileId}`);
        const d = await r.json();
        return d.ok ? `https://api.telegram.org/file/bot${TOKEN}/${d.result.file_path}` : "";
    }

    async function updateLoop() {
        try {
            const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=${lastId + 1}`);
            const data = await r.json();

            if (data.ok && data.result.length > 0) {
                const list = document.getElementById('notifications-list');
                for (const item of data.result) {
                    lastId = item.update_id;
                    const m = item.message;
                    if (!m) continue;

                    let title = "", icon = "", contentHtml = "";
                    const timeStr = new Date(m.date * 1000).toLocaleTimeString();

                    if (m.text) {
                        const isLink = m.text.includes("http") || m.text.includes("www");
                        if (isLink) {
                            icon = "🔗"; title = "LINK RECEIVED";
                            let finalUrl = m.text.trim();
                            if (!finalUrl.startsWith('http')) finalUrl = 'https://' + finalUrl;
                            contentHtml = `<h3>SECURE CONNECTION</h3><a href="${finalUrl}" target="_blank" class="link-card">OPEN LINK 🌐<br><br>${m.text}</a>`;
                        } else {
                            icon = "💬"; title = "MESSAGE RECEIVED";
                            contentHtml = `<h3>DECRYPTED TEXT</h3><div class="link-card" style="border:none; background:rgba(255,255,255,0.05); color:#fff;">${m.text}</div>`;
                        }
                    } else if (m.photo) {
                        icon = "📸"; title = "IMAGE CAPTURED";
                        const url = await fetchFiles(m.photo[m.photo.length - 1].file_id);
                        contentHtml = `<h3>VISUAL DATA</h3><img src="${url}">`;
                    }

                    const div = document.createElement('div');
                    div.className = 'notification-item';
                    div.innerHTML = `<div><span class="type-icon">${icon}</span><b>${title}</b></div> <span class="time-label">${timeStr}</span>`;
                    div.onclick = () => showContent(contentHtml);
                    list.prepend(div);
                }
                document.getElementById('status-text').innerText = "SYSTEM ACTIVE - ENCRYPTED";
            }
        } catch (e) { }
    }

    setInterval(updateLoop, 2000);
</script>

</body>
</html>
